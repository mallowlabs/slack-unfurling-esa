name: CI

on: [push]

permissions: {}

jobs:

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: ./slack-unfurling-esa
      - run: bundle exec ruby tests/unit/test_handler.rb
        working-directory: ./slack-unfurling-esa
